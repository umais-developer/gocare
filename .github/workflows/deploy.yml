name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy dist to root
        run: |
          cp -r dist/* .
          rm -rf dist

      - name: Commit and push built files
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Build: auto-deploy built files [skip ci]" || echo "No changes"
          git push origin main

      - name: Deploy custom domain CNAME
        run: |
          echo "gocare.rxintra.net" > CNAME
          git add CNAME
          git commit -m "Maintain CNAME for custom domain" || echo "CNAME unchanged"
          git push origin main || echo "Push failed"
